name: signslator
description: Real-time sign language translation app
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  web_socket_channel: ^2.4.0
  camera: ^0.10.5
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  animated_text_kit: ^4.2.2
  percent_indicator: ^4.2.3
  smooth_page_indicator: ^1.1.0

  # Networking & secure storage
  http: ^1.6.0
  flutter_secure_storage: ^10.0.0

  # State management & persistence
  provider: ^6.1.2
  shared_preferences: ^2.3.3

  # Social Auth
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.1.6
  flutter_dotenv: ^5.1.0

  # Internationalization helpers
  intl: ^0.20.2
  ckb_localizations: ^0.4.0

  # URL launching
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - .env
